# Static site: HTML/CSS/JS in /web
[build]
  publish = "web"

# Optional: long-cache for hashed assets later; safe defaults for static HTML
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
